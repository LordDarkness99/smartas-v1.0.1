<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMARTAS - Sawit Management Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-deco leaf-1">🍃</div>
    <div class="bg-deco leaf-2">🌿</div>

    <div class="main-sidebar">
        <div class="logo-wrapper">
            <div class="logo-circle">
                <img src="logo-smkn-2-sby.jpg" alt="Logo SMKN 2 SBY">
            </div>
            <h2>SMARTAS</h2>
            <p>Admin Dashboard</p>
        </div>
        
        <nav class="nav-menu">
            <a href="index.html" class="active">📊 Dashboard</a>
            <a href="../admin_jadwal.html">📅 Jadwal Mapel</a>
            <a href="../admin_presensi_pkl.html">🏫 Presensi Sekolah</a>
            <a href="../admin_presensi_mapel.html">📚 Pengaturan</a>
        </nav>
    </div>

    <div class="content">
        <div class="header-section">
            <h1 class="header-title">DASHBOARD RANGKUMAN KEHADIRAN</h1>
            <div class="date-badge">Kamis, 12 Maret 2026</div>
        </div>

        <div class="dashboard-grid">
            <div class="container-box">
                <div class="box-title">Status Kehadiran Siswa</div>
                <div class="stat-summary">
                    <div class="stat-item"><p>HADIR</p><span>1,150</span></div>
                    <div class="stat-item"><p>IZIN</p><span>45</span></div>
                    <div class="stat-item"><p>ALPA</p><span>15</span></div>
                </div>
                <div class="chart-container">
                    <canvas id="chartSiswa"></canvas>
                </div>
            </div>

            <div class="container-box">
                <div class="box-title">Status Kehadiran Guru</div>
                <div class="stat-summary">
                    <div class="stat-item"><p>HADIR</p><span>82</span></div>
                    <div class="stat-item"><p>ABSEN</p><span>3</span></div>
                </div>
                <div class="chart-container">
                    <canvas id="chartGuru"></canvas>
                </div>
            </div>

            <div class="container-box full-width">
                <div class="box-title">Tren Kehadiran Siswa & Guru (30 Hari Terakhir)</div>
                <div class="line-chart-container">
                    <canvas id="chartBulanan"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Shadow Plugin untuk volume Pie Chart
        const shadowPlugin = {
            id: 'shadowPlugin',
            beforeDraw: (chart) => {
                const { ctx } = chart;
                ctx.save();
                ctx.shadowColor = 'rgba(0, 0, 0, 0.15)';
                ctx.shadowBlur = 15;
                ctx.shadowOffsetX = 5;
                ctx.shadowOffsetY = 12;
            },
            afterDraw: (chart) => { chart.ctx.restore(); }
        };

        const pieConfig = {
            maintainAspectRatio: false,
            layout: { padding: 30 },
            animation: {
                animateRotate: true,
                animateScale: true,
                duration: 2000,
                easing: 'easeInOutQuart'
            },
            plugins: {
                legend: { 
                    position: 'bottom',
                    labels: { usePointStyle: true, padding: 20 }
                }
            },
            hover: { mode: 'nearest', intersect: true },
            transitions: {
                active: {
                    animation: { duration: 600, easing: 'easeOutQuart' }
                }
            },
            elements: {
                arc: {
                    hoverOffset: 35,
                    borderWidth: 1,
                    borderColor: '#ffffff',
                    borderRadius: 0, 
                    hoverBorderWidth: 3, 
                    hoverBorderColor: '#ffffff'
                }
            }
        };

        window.onload = () => {
            new Chart(document.getElementById('chartSiswa'), {
                type: 'pie',
                plugins: [shadowPlugin],
                data: {
                    labels: ['Hadir', 'Izin', 'Sakit', 'Alpa'],
                    datasets: [{
                        data: [1150, 45, 30, 15],
                        backgroundColor: ['#1B5E20', '#FBC02D', '#A1887F', '#C62828'] 
                    }]
                },
                options: pieConfig
            });

            new Chart(document.getElementById('chartGuru'), {
                type: 'pie',
                plugins: [shadowPlugin],
                data: {
                    labels: ['Hadir', 'Absen'],
                    datasets: [{
                        data: [82, 3],
                        backgroundColor: ['#1B5E20', '#C62828']
                    }]
                },
                options: pieConfig
            });

            new Chart(document.getElementById('chartBulanan'), {
                type: 'line',
                data: {
                    labels: ['Minggu 1', 'Minggu 2', 'Minggu 3', 'Minggu 4'],
                    datasets: [
                        { label: 'Siswa (%)', data: [95, 92, 98, 96], borderColor: '#2E7D32', tension: 0.4, fill: true, backgroundColor: 'rgba(46, 125, 50, 0.05)', pointRadius: 5 },
                        { label: 'Guru (%)', data: [100, 98, 99, 100], borderColor: '#FBC02D', tension: 0.4, pointRadius: 5 }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: { y: { min: 80, max: 100 } }
                }
            });
        };
    </script>
</body>
</html>
