<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pengaturan Mapel - SMARTAS Sawit Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style3.css">
    <style>
        /* CSS Khusus Search & UI Helper */
        .student-search-wrapper { margin-bottom: 15px; position: relative; }
        .student-search-input {
            padding-left: 40px !important;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%232E7D32" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>');
            background-repeat: no-repeat;
            background-position: 15px center;
        }
        .btn-small {
            background: #2E7D32; color: white; border: none; padding: 6px 14px;
            border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer;
            transition: 0.3s;
        }
        .search-results {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: white; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            z-index: 100; max-height: 200px; overflow-y: auto; display: none;
            border: 1px solid #f0f0f0; margin-top: 8px; padding: 8px;
        }
        .search-results div { padding: 12px 15px; cursor: pointer; font-size: 14px; border-radius: 10px; transition: 0.2s; }
        .search-results div:hover { background: #e8f5e9; color: #1B5E20; font-weight: bold; transform: translateX(5px); }
    </style>
</head>
<body>

    <div class="bg-deco leaf-1">🍃</div>
    <div class="bg-deco leaf-2">🌿</div>

    <aside class="main-sidebar">
        <div class="logo-wrapper">
            <div class="logo-circle">
                <img src="logo-smkn-2-sby.jpg" alt="Logo SMKN 2 SBY">
            </div>
            <h2>SMARTAS</h2>
            <p>Admin Dashboard</p>
        </div>
        <nav class="nav-menu">
            <a href="../index.html">📊 Dashboard</a>
            <a href="admin_jadwal.html">📅 Jadwal Mapel</a>
            <a href="admin_presensi_pkl.html">🏫 Presensi Sekolah</a>
            <a href="admin_presensi_mapel.html" class="active">📚 Pengaturan</a>
        </nav>
    </aside>

    <main class="content">
        <header class="header-section">
            <h1 class="header-title">KONFIGURASI MAPEL</h1>
            <div class="date-badge">Manajemen Peserta & Pengampu</div>
        </header>

        <section class="container-box entry-ani">
            <div class="grid-split">
                <div class="form-section">
                    <div class="form-group">
                        <label>Pilih Kelas</label>
                        <select id="select-kelas" onchange="generateUniqueStudents()">
                            <option value="">-- Pilih Kelas --</option>
                            <option value="X TKJ 1">X TKJ 1</option>
                            <option value="X TKJ 2">X TKJ 2</option>
                            <option value="XI RPL 1">XI RPL 1</option>
                            <option value="XI RPL 2">XI RPL 2</option>
                            <option value="XII MM 1">XII MM 1</option>
                            <option value="XII DKV 1">XII DKV 1</option>
                            <option value="X TITL 1">X TITL 1</option>
                            <option value="XI TKR 1">XI TKR 1</option>
                            <option value="XII TP 1">XII TP 1</option>
                            <option value="X TEI 1">X TEI 1</option>
                            <option value="XI TAB 1">XI TAB 1</option>
                            <option value="XII TKJ 1">XII TKJ 1</option>
                            <option value="XII RPL 1">XII RPL 1</option>
                            <option value="X MM 1">X MM 1</option>
                            <option value="XI DKV 2">XI DKV 2</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Mata Pelajaran</label>
                        <select id="select-mapel">
                            <option value="">-- Pilih Mapel --</option>
                            <option>AIJ-XII-01 (Infrastruktur Jaringan)</option>
                            <option>ASJ-XII-01 (Sistem Jaringan)</option>
                            <option>PKK-XII-01 (Kewirausahaan)</option>
                            <option>B.IND-02 (Bahasa Indonesia)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Guru Pengampu</label>
                        <div class="search-container">
                            <input type="text" id="guru-search" placeholder="Cari nama guru..." onfocus="showAllGuru()" oninput="filterGuru()" autocomplete="off">
                            <div id="guru-list" class="search-results"></div>
                        </div>
                    </div>

                    <div class="divider"><span>ATAU TAMBAH MAPEL BARU</span></div>
                    <div class="form-row">
                        <div class="form-group" style="flex:1;"><label>Kode</label><input type="text" placeholder="KOD-01"></div>
                        <div class="form-group" style="flex:1;"><label>Nama Mapel</label><input type="text" placeholder="Mapel Baru"></div>
                    </div>
                </div>

                <div class="student-section">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label id="list-label" style="margin-bottom: 0;">Daftar Siswa</label>
                        <button type="button" id="btn-select-all" class="btn-small" onclick="toggleSelectAll()" style="display: none;">✅ Pilih Semua</button>
                    </div>
                    
                    <div class="student-search-wrapper">
                        <input type="text" id="student-search" class="student-search-input" placeholder="Cari nama siswa di kelas ini..." oninput="filterStudents()">
                    </div>

                    <div class="student-list" id="student-container">
                        <div style="text-align: center; padding-top: 100px; color: #999;">
                            <p>⚠️ Silakan pilih kelas terlebih dahulu.</p>
                        </div>
                    </div>
                    <button class="btn-add">Simpan Konfigurasi</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const guruDB = ["Budi Santoso, S.Kom", "Ahmad Fauzi, M.T", "Siti Aminah, S.Pd", "Dra. Endang Wahyuni", "Eko Prasetyo, M.Kom", "Hendra Wijaya, S.T", "Lusi Rahmawati, S.T"];
        const firstNames = ["Ahmad", "Budi", "Candra", "Dahril", "Eka", "Feri", "Guntur", "Hana", "Indra", "Jaka", "Kevin", "Laras", "Muhammad", "Nurul", "Oki", "Putra", "Rizky", "Siti", "Taufik", "Umar"];
        const lastNames = ["Fauzi", "Santoso", "Ramadhan", "Putri", "Wijaya", "Pratama", "Meilani", "Kusuma", "Tarub", "Sanjaya", "Hidayah", "Setiana", "Aditya", "Ananda", "Saputra"];
        
        let masterStudentList = [];
        let isAllSelected = false;

        // --- Guru ---
        function showAllGuru() { document.getElementById('guru-list').style.display = 'block'; renderGuru(guruDB); }
        function filterGuru() {
            const val = document.getElementById('guru-search').value.toLowerCase();
            renderGuru(guruDB.filter(n => n.toLowerCase().includes(val)));
        }
        function renderGuru(list) {
            document.getElementById('guru-list').innerHTML = list.map(n => `<div onclick="selectGuru('${n}')">${n}</div>`).join('');
        }
        function selectGuru(n) {
            document.getElementById('guru-search').value = n;
            document.getElementById('guru-list').style.display = 'none';
        }

        // --- Siswa ---
        function generateUniqueStudents() {
            const kelas = document.getElementById('select-kelas').value;
            const container = document.getElementById('student-container');
            const btnSelect = document.getElementById('btn-select-all');
            if(!kelas) { btnSelect.style.display = 'none'; return; }

            container.style.opacity = '0';
            btnSelect.style.display = 'block';
            btnSelect.innerText = "✅ Pilih Semua";
            btnSelect.style.background = "#2E7D32";
            isAllSelected = false;
            
            setTimeout(() => {
                document.getElementById('list-label').innerText = "Daftar Siswa: " + kelas;
                masterStudentList = [];
                const seed = kelas.split('').reduce((a, b) => a + b.charCodeAt(0), 0);
                const jumlahSiswa = 15 + (seed % 10);
                for(let i=0; i<jumlahSiswa; i++) {
                    const fName = firstNames[(seed + i) % firstNames.length];
                    const lName = lastNames[(seed * i) % lastNames.length];
                    masterStudentList.push(fName + " " + lName);
                }
                renderStudents(masterStudentList);
                container.style.opacity = '1';
            }, 300);
        }

        function toggleSelectAll() {
            const checkboxes = document.querySelectorAll('#student-container input[type="checkbox"]');
            const btnSelect = document.getElementById('btn-select-all');
            isAllSelected = !isAllSelected;
            checkboxes.forEach(cb => cb.checked = isAllSelected);
            btnSelect.innerText = isAllSelected ? "❌ Batal Semua" : "✅ Pilih Semua";
            btnSelect.style.background = isAllSelected ? "#d63031" : "#2E7D32";
        }

        function filterStudents() {
            const val = document.getElementById('student-search').value.toLowerCase();
            renderStudents(masterStudentList.filter(s => s.toLowerCase().includes(val)));
        }

        function renderStudents(list) {
            const container = document.getElementById('student-container');
            if(list.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding-top:50px; color:#999;">Siswa tidak ditemukan...</div>';
                return;
            }
            container.innerHTML = list.map(name => `
                <div class="student-item">
                    <input type="checkbox" ${isAllSelected ? 'checked' : ''}> <span>${name}</span>
                </div>
            `).join('');
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) document.getElementById('guru-list').style.display = 'none';
        });
    </script>
</body>
</html>
